<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="player.css">
    <title>Habang Buhay</title>
</head>

<body>
    <div class="background">
        <img src="img/zack.jpg" id="bg" alt="">
    </div>
    <div class="container">
        <div class="song-info">
            <div class="song-name">song name</div>
            <div class="artist-name">name</div>
            <div class="progress-bar">
                <div class="fill-bar"></div>
            </div>
            <div class="time">0:00 - 0:00</div>
        </div>
        <div class="disk">
            <div id="cover" class="cover"></div>
        </div>
        <div class="controls">
            <i id="play" class="fa-solid fa-play"></i>
        </div>
    </div>
    <!-- back button (was missing in original) -->
    <div class="exit">
        <i class="fa-regular fa-circle-xmark" id="back"></i>
    </div>

    <script>
        const songList = [
            {
                name: "Habang Buhay",
                artist: "Zack Tabudlo",
                src: "music/opm/habangbuhay.mp3",
                cover: "img/zack.jpg",
                bg: "img/zack.jpg"
            }
        ];

        const artistName = document.querySelector('.artist-name');
        const musicName = document.querySelector('.song-name');
        const fillbar = document.querySelector('.fill-bar');
        const timeEl = document.querySelector('.time');
        const cover = document.querySelector('.cover');
        const bgEl = document.getElementById('bg');
        const playBtn = document.getElementById('play');
        const prog = document.querySelector('.progress-bar');
        const backBtn = document.getElementById('back');

        let song = new Audio();
        let playing = false;

        backBtn.addEventListener('click', () => window.history.back());

        document.addEventListener('DOMContentLoaded', () => {
            loadSong(0);
            song.addEventListener('timeupdate', updateProgress);
            playBtn.addEventListener('click', togglePlayPause);
            prog.addEventListener('click', seek);
        });

        function loadSong(index) {
            const s = songList[index];
            song.src = s.src;
            artistName.textContent = s.artist;
            musicName.textContent = s.name;
            cover.style.backgroundImage = `url(${s.cover})`;
            bgEl.src = s.bg;
        }

        function togglePlayPause() {
            if (playing) {
                song.pause();
                playBtn.classList.replace('fa-pause', 'fa-play');
            } else {
                song.play();
                playBtn.classList.replace('fa-play', 'fa-pause');
            }
            playing = !playing;
        }

        function updateProgress() {
            const { duration, currentTime } = song;
            if (!duration) return;
            fillbar.style.width = `${(currentTime / duration) * 100}%`;
            const fmt = t => `${Math.floor(t / 60)}:${String(Math.floor(t % 60)).padStart(2, '0')}`;
            timeEl.textContent = `${fmt(currentTime)} - ${fmt(duration)}`;
        }

        function seek(e) {
            if (song.duration) {
                song.currentTime = (e.offsetX / prog.clientWidth) * song.duration;
            }
        }
    </script>
</body>

</html>

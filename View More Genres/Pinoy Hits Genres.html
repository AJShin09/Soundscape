<!DOCTYPE html>
<html lang="en">

<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
     <link rel="stylesheet" href="../base.css">
     <title>Pinoy Hits</title>
</head>

<body>
     <nav class="nav-bar">
          <span class="brand-name">SOUNDSCAPE</span>
     </nav>
     <nav class="side-bar">
          <a href="../index.html">
               <div class="nav-icon-btn">
                    <span class="material-symbols-outlined">home</span>
                    <span class="label">HOME</span>
               </div>
          </a>
          <a href="../countries.html">
               <div class="nav-icon-btn">
                    <span class="material-symbols-outlined">globe_asia</span>
                    <span class="label">SEARCH</span>
               </div>
          </a>
     </nav>

     <div class="page-wrapper">
          <main class="main-contents">
               <div class="genre-header">
                    <img src="cover-pinoyplaylist.jpg" alt="Pinoy Hits" class="cover-image">
                    <div class="header-text">
                         <h1>PINOY HITS</h1>
                         <p>OPM · PPOP · RNB · ROCK</p>
                    </div>
               </div>

               <div class="song-section">
                    <div class="section-label">OPM</div>
                    <div class="song-grid" id="opm-grid"></div>
               </div>

               <div class="song-section">
                    <div class="section-label">PPOP</div>
                    <div class="song-grid" id="ppop-grid"></div>
               </div>

               <div class="song-section">
                    <div class="section-label">RNB</div>
                    <div class="song-grid" id="rnb-grid"></div>
               </div>

               <div class="song-section">
                    <div class="section-label">ROCK</div>
                    <div class="song-grid" id="rock-grid"></div>
               </div>
          </main>
     </div>

     <script>
          fetch('../songs.json')
               .then(res => res.json())
               .then(data => {
                    const songs = data.opm;
                    const grids = {
                         'OPM': document.getElementById('opm-grid'),
                         'PPOP': document.getElementById('ppop-grid'),
                         'RNB': document.getElementById('rnb-grid'),
                         'ROCK': document.getElementById('rock-grid'),
                    };
                    songs.forEach(song => {
                         const grid = grids[song.subgenre];
                         if (!grid) return;
                         const card = document.createElement('a');
                         card.href = `../player.html?genre=opm&id=${song.id}`;
                         card.className = 'song-card';
                         card.innerHTML = `
                        <div class="thumb" style="background-image:url(../${song.cover})"></div>
                        <div class="song-title">${song.name}</div>
                        <div class="song-artist">${song.artist}</div>
                    `;
                         grid.appendChild(card);
                    });
               });
     </script>
</body>

</html>

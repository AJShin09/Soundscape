<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.min.css">
    <link rel="stylesheet" href="style.css">

    <title>COUNTRIES</title>
</head>
<body>

    <nav class="country-nav">
        <div class="slideshow-section">
        <div class="slideshow-container">
            
            <div class="mySlides">
                <img class="pop-cover" src="image/ppop-cover.jpg" style="width:100%">
                <div class="text">PINOY MUSIC</div>
                <div class="subtext">DESCRIPTION</div>
            </div>
        
            <div class="mySlides">
                <img class="pop-cover" src="image/kpop-cover.jpg" style="width:100%">
                <div class="text">KOREAN MUSIC</div>
                <div class="subtext">DESCRIPTION</div>
            </div>
        
            <div class="mySlides">
                <img class="pop-cover" src="image/jpop-cover.jpg" style="width:100%">
                <div class="text">JAPAN MUSIC</div>
                <div class="subtext">DESCRIPTION</div>
            </div>

            <div class="mySlides">
                <img class="pop-cover" src="image/ipop-cover.jpg" style="width:100%">
                <div class="text">INDIAN MUSIC</div>
                <div class="subtext">DESCRIPTION</div>
            </div>

            <center class="center-this">
            <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
            <a class="next" onclick="plusSlides(1)">&#10095;</a>
            </center>

        </div>
        </div>

        <div style="text-align:center">
            <span class="dot" onclick="currentSlide(1)"></span>
            <span class="dot" onclick="currentSlide(2)"></span>
            <span class="dot" onclick="currentSlide(3)"></span>
            <span class="dot" onclick="currentSlide(4)"></span>
        </div>

        <div class="country-selection">

        <div class="genre-selection">
        <div class="hit-text">Pinoy Hits</div>
        <div class="containers">
            <div class="select-container-1">
                <div><img class="hit-icon" src="image/opm.png" style="width:100%"></div>
                <div class="title-1">OPM</div>
            </div>
            <div class="select-container-2"><div class="title-1">PPOP</div></div>
        </div>
        <div class="view-more">View More Genres</div>
        </div>

        <div class="genre-selection">
        <div class="hit-text">Korean Hits</div>
        <div class="containers">
            <div class="select-container-1"><div class="title-1">KRNB</div></div>
            <div class="select-container-2"><div class="title-1">KPOP</div></div>
        </div>
        <div class="view-more">View More Genres</div>
        </div>
            
        <div class="genre-selection">
        <div class="hit-text">Japan Hits</div>
        <div class="containers">
            <div class="select-container-1"><div class="title-1">Vocaloids</div></div>
            <div class="select-container-2"><div class="title-1">JPOP</div></div>
        </div>
        <div class="view-more">View More Genres</div>
        </div>

        <div class="genre-selection">
        <div class="hit-text">Indian Hits</div>
        <div class="containers">
            <div class="select-container-1"><div class="title-1">Indian Folk</div></div>
            <div class="select-container-2"><div class="title-1">Indian Pop</div></div>
        </div>
        <div class="view-more">View More Genres</div>
        </div>

        </div>

        
    </nav>
    <script src="script.js"></script>
</body>
</html>
